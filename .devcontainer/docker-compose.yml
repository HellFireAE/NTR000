services:
  adminer_csm:
    image: adminer:latest
    environment:
      ADMINER_DEFAULT_SERVER: database
    ports:
      - "8081:8080"
    depends_on:
      - database

  wp:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/var/www/html:cached
      - ../.github:/root/.config/gh
      - ../.ssh:/root/.ssh:ro
      - ./php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
      - ./php/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro
    ports:
      # Expose PHP-FPM only to nginx, not host
      - "9000:9000"
    depends_on:
      - database
    environment:
      WORDPRESS_DB_HOST: database
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: root
      WORDPRESS_DB_NAME: wordpress
    command: php-fpm

  nginx:
    image: nginx:1.29.2
    ports:
      - "127.0.0.1:80:80" # HTTP - redirects to HTTPS
      - "127.0.0.1:443:443" # HTTPS with SSL
    volumes:
      - ..:/var/www/html:cached
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - wp

  database:
    image: mariadb:10.11.13
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress
    ports:
      - 3307:3306
    volumes:
      - db:/var/lib/mysql
      - ./mysql/grant-root.sql:/docker-entrypoint-initdb.d/grant-root.sql:ro
      - ./mysql:/etc/mysql/conf.d:ro

volumes:
  db:
