[mysqld]
max_allowed_packet = 1024M

# Performance optimizations for local development
innodb_buffer_pool_size = 512M
innodb_log_file_size = 128M
innodb_flush_log_at_trx_commit = 2
innodb_flush_method = O_DIRECT

# Query cache (deprecated in newer versions but helps if available)
query_cache_type = 1
query_cache_size = 64M
query_cache_limit = 4M

# Connection settings
max_connections = 100
connect_timeout = 10

# Temp tables
tmp_table_size = 64M
max_heap_table_size = 64M

# Skip DNS lookups
skip_name_resolve = 1

# Faster but less safe (fine for dev)
sync_binlog = 0
